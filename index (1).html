<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registration Form</title>

    <!-- Calling External CSS -->
    <link rel="stylesheet" href="style_Zubayer.css">
</head>
<body>

    <h1 class="title">Student Registration Form</h1>
    <p class="desc">Please fill up all required fields</p>

    <div class="form-container">
        <form>
            <table class="form-table">

                <tr>
                    <td><label>Full Name:</label></td>
                    <td><input type="text" name="fullname" placeholder="Enter your name" required></td>
                </tr>

                <tr>
                    <td><label>Email:</label></td>
                    <td><input type="email" name="email" placeholder="Enter your email" required></td>
                </tr>

                <tr>
                    <td><label>Password:</label></td>
                    <td><input type="password" name="password" required></td>
                </tr>

                <tr>
                    <td><label>Phone:</label></td>
                    <td><input type="tel" name="phone"></td>
                </tr>

                <tr>
                    <td><label>Gender:</label></td>
                    <td>
                        <input type="radio" name="gender"> Male
                        <input type="radio" name="gender"> Female
                    </td>
                </tr>

                <tr>
                    <td><label>Department:</label></td>
                    <td>
                        <select>
                            <option>CSE</option>
                            <option>BBA</option>
                            <option>EEE</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td colspan="2" class="btn-row">
                        <input type="submit" value="Submit" class="btn-submit">
                        <input type="reset" value="Reset" class="btn-reset">
                    </td>
                </tr>

            </table>
        </form>
    </div>

</body>
</html>
